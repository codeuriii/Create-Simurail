name: build
on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to Maven, Curseforge, and Modrinth'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
      
      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Setup Permissions
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew assemble

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Artifacts
          path: build/libs/

      - name: Publish to Maven
        if: ${{ inputs.publish }}
        run: ./gradlew publish --stacktrace -PCrystaelixMavenUsername="${{ secrets.MAVEN_USERNAME }}" -PCrystaelixMavenPassword="${{ secrets.MAVEN_PASSWORD }}"

      - name: Publish to Curseforge and Modrinth
        if: ${{ inputs.publish }}
        run: ./gradlew publishMods --stacktrace -Pcurseforge.token="${{ secrets.CURSEFORGE_TOKEN }}" -Pmodrinth.token="${{ secrets.MODRINTH_TOKEN }}"
